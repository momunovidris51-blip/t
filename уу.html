<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бетти сканерлөө</title>
    <style>
        body {
            background-color: black;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Камеранын видеосу */
        #video {
            width: 100%;
            height: 100vh;
            object-fit: cover;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
            filter: grayscale(1) contrast(1.5) brightness(0.8); /* Хакердик эффект */
        }

        /* Жазуулар катмары */
        #terminal {
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 2;
            width: 90%;
            height: 80vh;
            overflow: hidden;
            pointer-events: none; /* Жазуулар видеону тоспойт */
            text-shadow: 0 0 5px #00ff00;
        }

        #ui {
            position: fixed;
            bottom: 50px;
            z-index: 3;
        }

        button {
            padding: 15px 30px;
            background: transparent;
            color: #00ff00;
            border: 2px solid #00ff00;
            font-size: 18px;
            cursor: pointer;
        }

        .error { color: red; }
    </style>
</head>
<body>

    <!-- Видео агымы -->
    <video id="video" autoplay playsinline></video>

    <!-- Катар жазуулар -->
    <div id="terminal"></div>

    <div id="ui">
        <button id="startBtn" onclick="initScanner()">СКАНЕРЛӨӨНҮ БАШТОО</button>
    </div>

    <script>
        const video = document.getElementById('video');
        const terminal = document.getElementById('terminal');
        const logs = [
            "Initializing camera...", "Target locked.",
            "Analyzing facial features...", "Scanning retinas...",
            "Accessing database...", "Identity: UNKNOWN",
            "Checking social media...", "Photos found: 142",
            "Locating GPS coordinates...", "STATUS: COMPROMISED",
            "EXTRACTING DATA...", "CRITICAL ERROR!",
            "System breach in progress...", "DELETING FILES..."
        ];

        async function initScanner() {
            try {
                // 1. Камерага уруксат суроо
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                document.getElementById('startBtn').style.display = 'none';

                // 2. Жазууларды баштоо
                startTyping();
            } catch (err) {
                alert("Камерага уруксат бериңиз!");
            }
        }

        function startTyping() {
            let i = 0;
            const interval = setInterval(() => {
                if (i < 60) {
                    const line = document.createElement('div');
                    const text = logs[Math.floor(Math.random() * logs.length)];
                    
                    if (text.includes("ERROR") || text.includes("DELETING")) {
                        line.className = "error";
                    }

                    line.innerText = ">> " + text;
                    terminal.appendChild(line);

                    // Телефон титирейт
                    if (navigator.vibrate) navigator.vibrate(50);

                    // Жазууларды өйдө жылдыруу
                    if (terminal.childNodes.length > 20) {
                        terminal.removeChild(terminal.firstChild);
                    }
                    i++;
                } else {
                    clearInterval(interval);
                    finish();
                }
            }, 150);
        }

        function finish() {
            alert("ТАМАША! Камера жөн эле иштеп жатат, эч нерсе сканерленген жок. 😂");
            location.reload();
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Action Quiz | Ultimate Game</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <link rel="stylesheet" href="https://cloudflare.com"/>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --neon-red: #e94560; --dark: #0a0a0c; }
        body { font-family: 'Orbitron', sans-serif; margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; background: var(--dark); color: white; overflow: hidden; padding: 15px; box-sizing: border-box; }

        /* Корунуктуу неон сеткасы */
        .grid-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0, 242, 255, 0.2) 2px, transparent 2px),
                              linear-gradient(90deg, rgba(0, 242, 255, 0.2) 2px, transparent 2px);
            background-size: 50px 50px; transform: perspective(600px) rotateX(60deg);
            transform-origin: center top; filter: drop-shadow(0 0 8px rgba(0, 242, 255, 0.6));
            animation: moveGrid 8s linear infinite; z-index: -1;
        }
        @keyframes moveGrid { 0% { background-position: 0 0; } 100% { background-position: 0 100px; } }

        /* Экшн киришүү (Overlay) */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 2000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        #countdown { font-size: 120px; color: var(--neon); text-shadow: 0 0 30px var(--neon); font-weight: 900; }

        /* Оюн картасы */
        .glass { 
            background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); 
            border-radius: 30px; padding: 25px; width: 100%; max-width: 420px; 
            text-align: center; border: 2px solid var(--neon); display: none;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
        }

        .timer { width: 60px; height: 60px; border: 4px solid var(--neon); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; font-weight: 900; font-size: 24px; box-shadow: 0 0 15px var(--neon); }
        
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .options-grid button:nth-child(3):last-child { grid-column: span 2; } /* 3 вариант болсо */

        .opt { 
            padding: 15px; border-radius: 15px; border: 2px solid var(--neon); 
            background: rgba(0,0,0,0.7); color: white; font-weight: bold; 
            cursor: pointer; transition: 0.3s; font-family: 'Orbitron'; font-size: 14px;
        }
        .opt:hover { background: var(--neon); color: black; box-shadow: 0 0 20px var(--neon); }
        
        .correct { background: #10b981 !important; border-color: #10b981 !important; animation: tada 0.5s; }
        .wrong { background: var(--neon-red) !important; border-color: var(--neon-red) !important; animation: shakeX 0.5s; }

        #qImg { width: 100%; border-radius: 20px; display: none; margin-bottom: 15px; max-height: 180px; object-fit: cover; }
        
        .gold-display { position: fixed; top: 20px; right: 20px; color: gold; font-weight: 900; font-size: 28px; text-shadow: 0 0 15px gold; z-index: 100; }
        .flying-gold { position: absolute; color: gold; font-size: 30px; z-index: 1000; transition: all 0.8s ease-in; pointer-events: none; }
    </style>
</head>
<body>

    <div class="grid-bg"></div>

    <!-- 1. Экшн киришүү -->
    <div id="overlay">
        <h1 id="countdown">READY?</h1>
        <button id="sBtn" onclick="startAction()" class="opt" style="width:250px; background:var(--neon-red); border:none;">MISSION START</button>
    </div>

    <!-- 2. Алтын көрсөткүч -->
    <div class="gold-display"><i class="fas fa-coins"></i> <span id="gc">0</span></div>

    <!-- 3. Оюн талаасы -->
    <div class="glass animate__animated animate__zoomIn" id="gamePanel">
        <div class="timer" id="tDisplay">0</div>
        <div id="pInfo" style="font-size: 10px; color: var(--neon); margin-bottom: 5px; opacity: 0.7;"></div>
        <img id="qImg">
        <h2 id="qText" style="font-size: 18px; line-height: 1.4;">LOADING...</h2>
        <div class="options-grid" id="optionsBox"></div>
    </div>

    <!-- Үндөр -->
    <audio id="sCorrect" src="https://mixkit.co"></audio>
    <audio id="sWrong" src="https://mixkit.co"></audio>

    <script>
        let questions = JSON.parse(localStorage.getItem("myQuiz")) || [];
        let timeLimit = parseInt(localStorage.getItem("quizTimeLimit")) || 10;
        let playerName = localStorage.getItem("currentPlayer") || "PLAYER";
        let idx = 0, score = 0, timeLeft, interval, canClick = true;

        // ЭКШН КИРИШҮҮ (3-2-1)
        function startAction() {
            document.getElementById('sBtn').style.display = 'none';
            let c = 3;
            let cdTag = document.getElementById('countdown');
            let t = setInterval(() => {
                if(c > 0) {
                    cdTag.innerText = c;
                    cdTag.className = "animate__animated animate__heartBeat";
                    c--;
                } else if(c === 0) {
                    cdTag.innerText = "GO!";
                    cdTag.style.color = "#10b981";
                    c--;
                } else {
                    clearInterval(t);
                    document.getElementById('overlay').style.display = 'none';
                    document.getElementById('gamePanel').style.display = 'block';
                    loadQuestion();
                }
            }, 1000);
        }

        // СУРООНУ ЖҮКТӨӨ
        function loadQuestion() {
            if(idx >= questions.length) return finishGame();
            canClick = true;
            timeLeft = timeLimit;
            document.getElementById('tDisplay').innerText = timeLeft;
            document.getElementById('pInfo').innerText = `${playerName} | MISSION ${idx + 1}/${questions.length}`;
            
            clearInterval(interval);
            interval = setInterval(() => {
                timeLeft--;
                document.getElementById('tDisplay').innerText = timeLeft;
                if(timeLeft <= 0) { clearInterval(interval); nextQuestion(); }
            }, 1000);

            const data = questions[idx];
            document.getElementById('qText').innerText = data.q;
            
            const img = document.getElementById('qImg');
            if(data.image) { img.src = data.image; img.style.display = "block"; } 
            else { img.style.display = "none"; }

            const area = document.getElementById('optionsBox');
            area.innerHTML = "";
            
            for(let key in data.options) {
                const btn = document.createElement('button');
                btn.className = 'opt';
                btn.innerText = data.options[key];
                btn.onclick = (e) => {
                    if(!canClick) return;
                    canClick = false;
                    clearInterval(interval);
                    
                    if(key === data.correct) {
                        score++;
                        btn.classList.add('correct');
                        document.getElementById('sCorrect').play();
                        flyGold(e.clientX, e.clientY);
                    } else {
                        btn.classList.add('wrong');
                        document.getElementById('sWrong').play();
                    }
                    setTimeout(nextQuestion, 1200);
                };
                area.appendChild(btn);
            }
        }

        // АЛТЫН УЧУРУУ ЭФФЕКТИСИ
        function flyGold(x, y) {
            const gold = document.createElement('i');
            gold.className = 'fas fa-coins flying-gold';
            gold.style.left = x + 'px';
            gold.style.top = y + 'px';
            document.body.appendChild(gold);

            const target = document.getElementById('gc').getBoundingClientRect();
            
            setTimeout(() => {
                gold.style.left = (target.left + 10) + 'px';
                gold.style.top = (target.top + 10) + 'px';
                gold.style.opacity = '0';
                gold.style.transform = 'scale(2)';
            }, 50);

            setTimeout(() => {
                gold.remove();
                document.getElementById('gc').innerText = score * 10;
            }, 800);
        }

        function nextQuestion() { idx++; loadQuestion(); }

        // ОЮНДУН АЯГЫ
        function finishGame() {
            // Рекордду сактоо
            let board = JSON.parse(localStorage.getItem("leaderboard")) || [];
            board.push({ name: playerName, score: score * 10 });
            localStorage.setItem("leaderboard", JSON.stringify(board));
            
            // Жалпы казынаны жаңылоо
            let total = parseInt(localStorage.getItem("totalGoldEarned") || 0);
            localStorage.setItem("totalGoldEarned", total + (score * 10));

            document.getElementById('gamePanel').innerHTML = `
                <h2 class="animate__animated animate__jackInTheBox" style="color:var(--neon)">MISSION COMPLETE</h2>
                <div style="font-size: 50px; font-weight: 900; color: gold; text-shadow: 0 0 20px gold;">${score * 10} GOLD</div>
                <p style="opacity:0.8">${playerName}, сиздин упайыңыз: ${score}/${questions.length}</p>
                <button class="opt" style="width:100%; margin-top:20px;" onclick="location.href='index.html'">МЕНЮГО КАЙТУУ</button>
            `;
        }
    </script>
</body>
</html>

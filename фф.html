<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Дүйнөдөгү эң...</title>
    <style>
        body {
            background-color: #000;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
            display: none;
            filter: brightness(0.5) contrast(1.2);
            transform: scaleX(-1);
        }

        #terminal {
            position: fixed;
            top: 50px;
            left: 20px;
            z-index: 5;
            font-size: 28px; 
            font-weight: 900; 
            pointer-events: none;
            text-shadow: 3px 3px 6px #000, -3px -3px 6px #000, 3px -3px 6px #000, -3px 3px 6px #000; 
            width: 95%;
            line-height: 1.5;
        }

        .btn-box {
            position: relative;
            z-index: 10;
            padding: 30px;
            border: 3px solid #00ff00;
            background: rgba(0, 0, 0, 0.95);
            border-radius: 15px;
            text-align: center;
            max-width: 90%;
        }

        button {
            background: #00ff00;
            color: #000;
            border: none;
            padding: 20px 30px;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            border-radius: 10px;
            width: 100%;
        }

        .line { margin-bottom: 20px; opacity: 0; animation: fadeIn 0.5s forwards; }
        @keyframes fadeIn { to { opacity: 1; } }

        .critical { color: #ff0000; text-shadow: 2px 2px 4px #000; }
    </style>
</head>
<body>

    <div id="startUI" class="btn-box">
        <h2 style="font-size: 30px;">Салам! 😊</h2>
        <p style="font-size: 20px;">Дүйнөдөгү эң жакшы жана эң сулуу адамды көргүң келеби?</p>
        <button onclick="startPrank()">ООбА, КӨРГҮМ КЕЛЕТ!</button>
    </div>

    <video id="video" autoplay playsinline></video>
    <div id="terminal"></div>

    <script>
        const logs = [
            "Камера иштетилди...",
            "Объект аныкталууда...",
            "Издөө: Дүйнөдөгү эң сулуу адам...",
            "ТАБЫЛДЫ! Бул сизсиз! 😍",
            "Сулуулукту талдоо: 100%",
            "КАТА: Система мындай сулуулукка чыдабайт!",
            "КРИТИКАЛЫК АБАЛГА ӨТҮҮ...",
            "Өчүрүү башталды: 3...",
            "Өчүрүү башталды: 2...",
            "Өчүрүү башталды: 1...",
            "КАЙРА БАШЫНАН ЖҮКТӨӨ..."
        ];

        async function startPrank() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                const video = document.getElementById('video');
                video.srcObject = stream;
                video.style.display = 'block';
                document.getElementById('startUI').style.display = 'none';

                let i = 0;
                const interval = setInterval(() => {
                    if (i < logs.length) {
                        const line = document.createElement('div');
                        line.className = 'line';
                        
                        if (logs[i].includes("КАТА") || logs[i].includes("КРИТИКАЛЫК")) {
                            line.classList.add('critical');
                        }

                        line.innerText = ">> " + logs[i];
                        document.getElementById('terminal').appendChild(line);
                        
                        if (navigator.vibrate) navigator.vibrate(150);
                        i++;
                    } else {
                        clearInterval(interval);
                        setTimeout(() => {
                            location.reload(); 
                        }, 2000);
                    }
                }, 2000); 

            } catch (err) {
                alert("Камерага уруксат бериңиз! 😉");
            }
        }
    </script>
</body>
</html>
